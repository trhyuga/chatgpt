            <path d="M16.3 16.7l2.7 2.7 5-5" fill="none" stroke="#2f6bff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span class="brand-text"><span class="brand-name">Asistia</span><span class="brand-tag">軽作業の人材を地域から探す</span></span>

        <nav class="breadcrumb" aria-label="パンくず">
          <a href="index.html">ホーム</a><span class="sep">›</span><span>企業を探す</span>
        </nav>
        <div class="section-head">
          <h1 style="margin: 0 0 6px; font-size: 1.7rem">企業を探す</h1>
          <p>条件で絞り込み、気になる企業を比較しながら検討できます。</p>
        </div>

        <div class="list-layout">
          <aside class="filter-panel" id="filter-panel"></aside>

          <div class="list-main">
            <div class="list-toolbar">
              <p class="result-count" id="result-count"></p>
              <div class="toolbar-right">
                <button class="btn btn-secondary btn-sm filter-mobile-toggle" id="filter-mobile-toggle" type="button">絞り込み</button>
                <label for="sort-select" class="nowrap" style="font-size: 0.85rem; color: var(--muted)">並び替え</label>
                <select id="sort-select" aria-label="並び替え">
                  <option value="updated">更新が新しい順</option>
                  <option value="name">会社名順</option>
                  <option value="founded">設立が古い順</option>
                </select>
              </div>
            </div>
            <div class="active-filters" id="active-filters"></div>
            <div id="results"><div class="loading"><div class="spinner"></div>読み込み中…</div></div>
            <div class="center" id="load-more" style="margin-top: 24px"></div>
          </div>
        </div>
      </div>

            <a href="request.html">修正・削除の依頼</a>
            <a href="policy.html">掲載ポリシー</a>
