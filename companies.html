<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>企業一覧 | Asistia</title>
    <meta name="description" content="軽作業のスタッフ手配に対応する企業の一覧。キーワード・地域・対応作業で絞り込めます。" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%232563eb'/%3E%3Cpath d='M8 12h16v12H8z' fill='none' stroke='white' stroke-width='2'/%3E%3Cpath d='M12 12V8h8v4' fill='none' stroke='white' stroke-width='2'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="brand" href="index.html">
          Asistia
          <small>軽作業派遣の会社を探す情報サイト</small>
        </a>
        <nav class="nav">
          <a href="companies.html">企業一覧</a>
          <a href="request.html">掲載・修正・削除の依頼</a>
          <a href="policy.html">掲載ポリシー</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h1>企業一覧</h1>

        <div class="filters">
          <div>
            <label for="f-keyword">キーワード</label>
            <input type="search" id="f-keyword" placeholder="会社名・作業・地域名" />
          </div>
          <div>
            <label for="f-area">地域・都道府県</label>
            <select id="f-area"></select>
          </div>
          <div>
            <label for="f-service">対応作業</label>
            <select id="f-service"></select>
          </div>
          <div>
            <label for="f-sort">並び替え</label>
            <select id="f-sort">
              <option value="updated">新着順</option>
              <option value="name">会社名順</option>
            </select>
          </div>
        </div>

        <div class="filter-bar">
          <p class="result-count" id="result-count"></p>
          <button type="button" class="btn btn-ghost btn-sm" id="clear-filters">
            条件をクリア
          </button>
        </div>

        <div id="company-list">
          <p class="loading">読み込み中…</p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-links">
          <a href="index.html">トップ</a>
          <a href="request.html">掲載・修正・削除の依頼</a>
          <a href="policy.html">掲載ポリシー</a>
        </div>
        <div>
          ※本サイトは公開情報をもとにした情報掲載サイトです。掲載内容の修正・削除はいつでも依頼できます。
        </div>
      </div>
    </footer>

    <script src="js/ui.js"></script>
    <script src="js/data.js"></script>
    <script src="js/companies.js"></script>
  </body>
</html>
