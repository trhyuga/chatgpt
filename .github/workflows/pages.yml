name: Deploy to GitHub Pages

# main へ push されるたびに静的サイトを GitHub Pages へ公開する。
# 初回のみ、リポジトリの Settings → Pages → Build and deployment の
# Source を「GitHub Actions」に設定してください（一度だけの操作）。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに絞り、進行中のデプロイはキャンセルしない
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリ直下が静的サイトのルート
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
